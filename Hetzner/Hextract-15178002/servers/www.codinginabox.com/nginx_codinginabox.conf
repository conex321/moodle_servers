# CodingInABox — nginx site config (NOT Moodle; static SPA + arduino-compile proxy).
# Install to /etc/nginx/sites-available/codinginabox and symlink into sites-enabled.
# This is the HTTP-first form; `certbot --nginx -d www.codinginabox.com -d codinginabox.com`
# injects the :443 server block, the cert paths, and the 80->443 redirect.
#
# Architecture: static files from /var/www/codinginabox (= repo site/public);
# /compile and /health reverse-proxy to the arduino-compile container on 127.0.0.1:8088
# (same-origin, so no CORS needed and window.LAB_COMPILE_URL points at the bare domain).

server {
    listen 80;
    listen [::]:80;
    server_name www.codinginabox.com codinginabox.com;

    root /var/www/codinginabox;
    index index.html;

    # Security headers (mirror vercel.json)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Arduino lab compile service (Node container on localhost:8088)
    location /compile {
        proxy_pass http://127.0.0.1:8088/compile;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 60s;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8088/health;
    }

    # Static site: try exact file, then the .html form (extensionless links),
    # then directory index, else 404.
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
