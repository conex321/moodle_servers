<style id="emcs-footer-styles">
/* Hide the default RemUI footer content so our custom footer replaces it cleanly. */
#page-footer .footer-dark,
#page-footer .footer-inner,
#page-footer .footer-content-popover,
#page-footer .tool_dataprivacy,
#page-footer .logininfo,

#page-footer { padding: 0 !important; background: #0F2921 !important; }

#emcs-footer { background: #0F2921; color: #D4D4D4; font-family: 'Inter', system-ui, sans-serif; }
#emcs-footer a { color: #D4D4D4; text-decoration: none; transition: color .15s ease; }
#emcs-footer a:hover { color: #D4AF37; }
#emcs-footer .emcs-footer-main {
  max-width: 1280px;
  margin: 0 auto;
  padding: 4rem 1.5rem 3rem;
  display: grid;
  grid-template-columns: 1.2fr 1fr 1fr 1fr;
  gap: 3rem;
}
#emcs-footer .emcs-footer-brand .emcs-footer-logo {
  display: inline-flex;
  align-items: center;
  margin-bottom: 1rem;
}
#emcs-footer .emcs-footer-brand .emcs-footer-logo svg { width: 64px; height: 64px; }
#emcs-footer .emcs-footer-tagline {
  color: #A3A3A3;
  font-size: 0.95rem;
  line-height: 1.5;
  margin: 0 0 1.25rem;
  max-width: 280px;
}
#emcs-footer .emcs-footer-social {
  display: flex;
  gap: 0.75rem;
}
#emcs-footer .emcs-social-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  color: #A3A3A3;
  transition: background .15s ease, color .15s ease;
}
#emcs-footer .emcs-social-link:hover {
  background: rgba(212,175,55,0.15);
  color: #D4AF37;
}
#emcs-footer .emcs-footer-column h4 {
  color: #FFFFFF;
  font-size: 0.875rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin: 0 0 1.25rem;
}
#emcs-footer .emcs-footer-column ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
#emcs-footer .emcs-footer-column li {
  margin-bottom: 0.625rem;
  font-size: 0.95rem;
  line-height: 1.5;
}
#emcs-footer .emcs-footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 1.5rem 1.5rem;
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: space-between;
  align-items: center;
  font-size: 0.875rem;
  color: #A3A3A3;
}
#emcs-footer .emcs-footer-bottom p { margin: 0; }
#emcs-footer .emcs-footer-legal { display: flex; gap: 1.5rem; }
@media (max-width: 900px) {
  #emcs-footer .emcs-footer-main { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
  #emcs-footer .emcs-footer-main { grid-template-columns: 1fr; padding: 3rem 1.25rem 2rem; }
  #emcs-footer .emcs-footer-bottom { flex-direction: column; align-items: flex-start; }
}
